<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="合同会社SFLへのお問い合わせ。美容サロンDX、Cycle Pro、Lark導入、AI活用支援、研修についてご相談ください。">
  <title>お問い合わせ | SFL / SALON FLOW LAB.</title>
  <link rel="icon" href="../../assets/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/sfl.css?v=20260704-fixed-header">
</head>
<body>
  <div class="sfl-page">
    <div data-site-header data-active="contact"></div>
    <div data-site-drawer></div>
    <main>
      <section class="sfl-page-title">
        <div class="sfl-container">
          <span class="sfl-en">Contact</span>
          <h1>お問い合わせ</h1>
          <p>美容サロンDX、Cycle Pro、Lark導入、AI活用支援、研修についてお気軽にご相談ください。</p>
        </div>
      </section>
      <section class="sfl-section">
        <div class="sfl-container sfl-download-grid">
          <article class="sfl-card">
            <span class="sfl-en">Consultation</span>
            <h3>まずはサロンの課題をお聞かせください</h3>
            <p>送信後、担当者よりメールまたはお電話にてご連絡いたします。通常1〜2営業日以内に返信します。</p>
            <ul>
              <li>Cycle ProやSALON FLOW ONEの導入相談</li>
              <li>美容サロンDX、Lark導入、AI活用の相談</li>
              <li>料金、導入期間、サポート範囲の確認</li>
            </ul>
          </article>
          <article class="sfl-card sfl-download-box">
            <span class="sfl-en">Contact</span>
            <h3>お問い合わせフォーム</h3>
            <p>ご相談内容をご入力ください。サロンの状況に合わせて、最適な導入ステップをご提案します。</p>
            <div
              data-sfl-lead-form
              data-form-type="お問い合わせ"
              data-submit-label="送信する"
              data-message-label="お問い合わせ内容"
              data-message-placeholder="例）紙カルテの運用見直し、Cycle Proの導入時期、店舗数・スタッフ人数など"
              data-message-rows="5"
            ></div>
          </article>
        </div>
      </section>
    </main>
    <div data-site-footer></div>
  </div>
  <script src="../../assets/js/sfl-services-catalog.js"></script>
  <script src="../../assets/js/site-chrome.js"></script>
  <script src="../../assets/js/sfl-lead-form.js"></script>
  <script src="../../assets/js/contact-form.js"></script>
</body>
